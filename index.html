<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restaurant Reservation</title>

<style>
body{
    margin:0;
    background:#f5f1ea;
    font-family:"Yu Gothic","Hiragino Sans",sans-serif;
    color:#333;
}

.container{
    max-width:700px;
    margin:50px auto;
    padding:40px;
    background:white;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    color:#5d4037;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#777;
    margin-bottom:40px;
}

.form-group{
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
}

input,
select,
textarea{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    box-sizing:border-box;
    font-size:16px;
}

textarea{
    resize:vertical;
}

button{
    width:100%;
    padding:15px;
    background:#6d4c41;
    color:white;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#4e342e;
}
</style>

</head>
<body>

<div class="container">

    <h1>Restaurant Reservation</h1>
    <p class="subtitle">
        ご予約フォーム
    </p>

    <iframe
    name="hidden_iframe"
    id="hidden_iframe"
    style="display:none;"
></iframe>

    <!--
        ↓↓↓ ここにGoogleフォームの送信先URLを入れる ↓↓↓

        action="https://docs.google.com/forms/d/e/XXXXXXXXXXXXXXXX/formResponse"

        formResponse で終わるURLを使う
    -->
    <form
        id="reserveForm"
        action="https://docs.google.com/forms/u/0/d/1ab7WCyBviqUp-4ElyU0eXKJ6Xc_R9iDsP16fN0g9-oA/formResponse"
        method="POST"
        target="hidden_iframe"
    >

        <div class="form-group">
            <label>お名前</label>

            <!--
                ↓↓↓ 名前のentry番号 ↓↓↓
                name="entry.123456789"
            -->
            <input
                type="text"
                name="entry.2005620554"
                required
            >
        </div>

        <div class="form-group">
            <label>電話番号</label>

            <!--
                ↓↓↓ 電話番号のentry番号 ↓↓↓
            -->
            <input
                type="tel"
                name="entry.1166974658"
                required
            >
        </div>

        <div class="form-group">
            <label>メールアドレス</label>

            <!--
                ↓↓↓ メールアドレスのentry番号 ↓↓↓
            -->
            <input
                type="email"
                name="entry.1045781291"
            >
        </div>

        <div class="form-group">
            <label>来店日</label>

            <!--
                ↓↓↓ 来店日のentry番号 ↓↓↓
            -->
            <input
                type="date"
                name="entry.1938750856"
                required
            >
        </div>

        <div class="form-group">
            <label>来店時間</label>

            <!--
                ↓↓↓ 来店時間のentry番号 ↓↓↓
            -->
            <input
                type="time"
                name="entry.430639884"
                required
            >
        </div>

        <div class="form-group">
            <label>人数</label>

            <!--
                ↓↓↓ 人数のentry番号 ↓↓↓
            -->
            <select name="entry.1806896106">
                <option value="1名">1名</option>
                <option value="2名">2名</option>
                <option value="3名">3名</option>
                <option value="4名">4名</option>
                <option value="5名以上">5名以上</option>
            </select>
        </div>

        <button type="submit">
            予約する
        </button>

    </form>

</div>

<script>

const iframe =
    document.getElementById("hidden_iframe");

let submitted = false;

document
.getElementById("reserveForm")
.addEventListener("submit", function(){

    submitted = true;

});

iframe.onload = function(){

    if(submitted){

        document.body.innerHTML = `
            <div style="
                height:100vh;
                display:flex;
                flex-direction:column;
                justify-content:center;
                align-items:center;
            ">
                <h1>ご予約ありがとうございます</h1>
                <p>予約を受け付けました。</p>
            </div>
        `;

    }

};

</script>

</body>
</html>
